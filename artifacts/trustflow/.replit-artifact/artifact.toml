kind = "web"
previewPath = "/"
title = "TrustFlow AI"
version = "1.0.0"
id = "artifacts/trustflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20825

[services.development]
run = "pnpm --filter @workspace/trustflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustflow", "run", "build" ]
publicDir = "artifacts/trustflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20825"
BASE_PATH = "/"
