openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TrustFlow AI - Behavioral Authentication API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: behavior
    description: Behavioral data collection
  - name: trust
    description: Trust score operations
  - name: transactions
    description: Transaction operations
  - name: admin
    description: Admin dashboard operations
  - name: demo
    description: Fraud demo scenarios
  - name: alerts
    description: Alert operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful or OTP required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpInput"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session info
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /behavior/event:
    post:
      operationId: recordBehaviorEvent
      tags: [behavior]
      summary: Record a behavioral event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BehaviorEventInput"
      responses:
        "200":
          description: Event recorded and trust score updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustScoreUpdate"

  /trust/score:
    get:
      operationId: getTrustScore
      tags: [trust]
      summary: Get current trust score for the session
      responses:
        "200":
          description: Current trust score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustScore"

  /trust/history:
    get:
      operationId: getTrustHistory
      tags: [trust]
      summary: Get trust score history for the session
      responses:
        "200":
          description: Trust score history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrustHistoryPoint"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions for the current user
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResult"
        "403":
          description: Session blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/overview:
    get:
      operationId: getAdminOverview
      tags: [admin]
      summary: Get admin dashboard overview stats
      responses:
        "200":
          description: Admin overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with risk scores
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/alerts:
    get:
      operationId: listAlerts
      tags: [admin]
      summary: List fraud alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /admin/sessions:
    get:
      operationId: listSessions
      tags: [admin]
      summary: List active and suspicious sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionRecord"

  /admin/heatmap:
    get:
      operationId: getFraudHeatmap
      tags: [admin]
      summary: Get fraud attempt heatmap data
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatmapPoint"

  /demo/scenarios:
    get:
      operationId: getDemoScenarios
      tags: [demo]
      summary: Get demo fraud scenarios comparison data
      responses:
        "200":
          description: Demo scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoScenarios"

  /demo/simulate:
    post:
      operationId: simulateScenario
      tags: [demo]
      summary: Simulate a fraud scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateInput"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        deviceFingerprint:
          type: string
        ipAddress:
          type: string
      required: [username, password]

    AuthResult:
      type: object
      properties:
        status:
          type: string
          enum: [success, otp_required, biometric_required, blocked]
        sessionToken:
          type: ["string", "null"]
        message:
          type: string
        userId:
          type: ["integer", "null"]
        username:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
      required: [status, message, riskLevel]

    OtpInput:
      type: object
      properties:
        sessionToken:
          type: string
        otp:
          type: string
      required: [sessionToken, otp]

    SessionInfo:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        sessionToken:
          type: string
        trustScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        deviceFingerprint:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        loginTime:
          type: string
        isAuthenticated:
          type: boolean
      required: [userId, username, sessionToken, trustScore, riskLevel, loginTime, isAuthenticated]

    BehaviorEventInput:
      type: object
      properties:
        sessionToken:
          type: string
        eventType:
          type: string
          enum: [keystroke, mouse_move, click, scroll, page_focus, page_blur, idle]
        typingSpeed:
          type: ["number", "null"]
        keystrokeInterval:
          type: ["number", "null"]
        mouseVelocity:
          type: ["number", "null"]
        clickCount:
          type: ["integer", "null"]
        scrollSpeed:
          type: ["number", "null"]
        pageX:
          type: ["number", "null"]
        pageY:
          type: ["number", "null"]
        metadata:
          type: object
          additionalProperties: true
      required: [sessionToken, eventType]

    TrustScoreUpdate:
      type: object
      properties:
        trustScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        riskFactors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        action:
          type: string
          enum: [allow, request_otp, request_biometric, block]
      required: [trustScore, riskLevel, riskFactors, action]

    RiskFactor:
      type: object
      properties:
        factor:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        contribution:
          type: integer
      required: [factor, description, severity, contribution]

    TrustScore:
      type: object
      properties:
        trustScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        riskFactors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        action:
          type: string
          enum: [allow, request_otp, request_biometric, block]
        lastUpdated:
          type: string
      required: [trustScore, riskLevel, riskFactors, action, lastUpdated]

    TrustHistoryPoint:
      type: object
      properties:
        timestamp:
          type: string
        trustScore:
          type: integer
        riskLevel:
          type: string
      required: [timestamp, trustScore, riskLevel]

    TransactionInput:
      type: object
      properties:
        sessionToken:
          type: string
        amount:
          type: number
        beneficiary:
          type: string
        transactionType:
          type: string
          enum: [transfer, payment, withdrawal]
        description:
          type: ["string", "null"]
      required: [sessionToken, amount, beneficiary, transactionType]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        beneficiary:
          type: string
        transactionType:
          type: string
        status:
          type: string
          enum: [completed, flagged, blocked]
        riskScore:
          type: integer
        timestamp:
          type: string
        description:
          type: ["string", "null"]
      required: [id, userId, amount, beneficiary, transactionType, status, riskScore, timestamp]

    TransactionResult:
      type: object
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        trustScoreImpact:
          type: integer
        newTrustScore:
          type: integer
        riskFactors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        action:
          type: string
          enum: [allow, request_otp, request_biometric, block]
        message:
          type: string
      required: [transaction, trustScoreImpact, newTrustScore, riskFactors, action, message]

    AdminOverview:
      type: object
      properties:
        activeUsers:
          type: integer
        totalSessions:
          type: integer
        fraudAlerts:
          type: integer
        blockedSessions:
          type: integer
        avgTrustScore:
          type: integer
        highRiskUsers:
          type: integer
        transactionsToday:
          type: integer
        flaggedTransactions:
          type: integer
        riskDistribution:
          type: object
          properties:
            low:
              type: integer
            medium:
              type: integer
            high:
              type: integer
            critical:
              type: integer
          required: [low, medium, high, critical]
      required: [activeUsers, totalSessions, fraudAlerts, blockedSessions, avgTrustScore, highRiskUsers, transactionsToday, flaggedTransactions, riskDistribution]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        trustScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        lastLogin:
          type: ["string", "null"]
        isActive:
          type: boolean
        loginAttempts:
          type: integer
        flaggedTransactions:
          type: integer
        location:
          type: string
        device:
          type: string
      required: [id, username, email, trustScore, riskLevel, isActive, loginAttempts, flaggedTransactions, location, device]

    Alert:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        alertType:
          type: string
          enum: [impossible_travel, new_device, behavior_change, high_risk_transaction, account_takeover, suspicious_login]
        severity:
          type: string
          enum: [low, medium, high, critical]
        description:
          type: string
        timestamp:
          type: string
        isResolved:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
      required: [id, userId, username, alertType, severity, description, timestamp, isResolved]

    SessionRecord:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        trustScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        ipAddress:
          type: string
        location:
          type: string
        device:
          type: string
        loginTime:
          type: string
        isActive:
          type: boolean
        isSuspicious:
          type: boolean
      required: [id, userId, username, trustScore, riskLevel, ipAddress, location, device, loginTime, isActive, isSuspicious]

    HeatmapPoint:
      type: object
      properties:
        region:
          type: string
        country:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        fraudAttempts:
          type: integer
        severity:
          type: string
          enum: [low, medium, high]
      required: [region, country, latitude, longitude, fraudAttempts, severity]

    DemoScenarios:
      type: object
      properties:
        normalUser:
          $ref: "#/components/schemas/ScenarioData"
        attackerUser:
          $ref: "#/components/schemas/ScenarioData"
      required: [normalUser, attackerUser]

    ScenarioData:
      type: object
      properties:
        label:
          type: string
        description:
          type: string
        trustScoreTimeline:
          type: array
          items:
            $ref: "#/components/schemas/TrustHistoryPoint"
        riskFactors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        finalScore:
          type: integer
        finalRiskLevel:
          type: string
        behaviorProfile:
          type: object
          additionalProperties: true
      required: [label, description, trustScoreTimeline, riskFactors, finalScore, finalRiskLevel, behaviorProfile]

    SimulateInput:
      type: object
      properties:
        scenario:
          type: string
          enum: [normal, attacker]
        step:
          type: integer
      required: [scenario]

    SimulationResult:
      type: object
      properties:
        scenario:
          type: string
        step:
          type: integer
        trustScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        riskFactors:
          type: array
          items:
            $ref: "#/components/schemas/RiskFactor"
        event:
          type: string
        action:
          type: string
          enum: [allow, request_otp, request_biometric, block]
      required: [scenario, step, trustScore, riskLevel, riskFactors, event, action]
